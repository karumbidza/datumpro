<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="overflow:hidden;border-radius:8px;border:1px solid #e4e4e7;background:#ffffff">
  <div style="display:flex;align-items:center;gap:8px;border-bottom:1px solid #e4e4e7;padding:12px 16px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#18181b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h10"></path><path d="M6 12h9"></path><path d="M11 18h7"></path><path d="M3 4v16"></path></svg>
    <h3 style="margin:0;font-size:14px;font-weight:500;color:#18181b">Timeline Overview</h3>
  </div>

  <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:10px 12px">
    <div style="position:relative">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;left:10px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
      <input value="{{ search }}" onChange="{{ onSearch }}" placeholder="Search tasks…" style="width:176px;border-radius:6px;border:1px solid #e4e4e7;background:#fafafa;padding:6px 8px 6px 28px;font-size:12px;outline:none;font-family:inherit" />
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">
      <sc-for list="{{ pills }}" as="p" hint-placeholder-count="5">
        <button onClick="{{ p.onClick }}" style="border-radius:9999px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;background:{{ p.bg }};color:{{ p.fg }};border:{{ p.border }}">{{ p.label }}</button>
      </sc-for>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:4px;font-size:11px;color:#71717a">
      <span>Scale:</span>
      <sc-for list="{{ scales }}" as="s" hint-placeholder-count="3">
        <button onClick="{{ s.onClick }}" style="border-radius:9999px;padding:4px 10px;font-size:11px;cursor:pointer;text-transform:capitalize;font-family:inherit;background:{{ s.bg }};color:{{ s.fg }};border:{{ s.border }}">{{ s.label }}</button>
      </sc-for>
    </div>
  </div>

  <div style="padding:0 12px 8px;font-size:11px;color:#a1a1aa">{{ summaryText }}</div>

  <div style="position:relative;max-height:480px;overflow:auto">
    <div style="min-width: {{ minWidth }}px">
      <div style="position:sticky;top:0;z-index:20;display:flex;height:44px">
        <div style="position:sticky;left:0;z-index:30;display:flex;align-items:flex-end;border-bottom:1px solid #e4e4e7;border-right:1px solid #e4e4e7;background:#fafafa;padding:0 12px;width:170px;min-width:170px;box-sizing:border-box">
          <span style="padding-bottom:4px;font-size:10px;letter-spacing:0.05em;color:#a1a1aa">TASK / ASSIGNEE</span>
        </div>
        <div style="display:flex;border-bottom:1px solid #e4e4e7;background:#fafafa;min-width:{{ totalWidth }}px">
          <sc-for list="{{ days }}" as="d" hint-placeholder-count="14">
            <div style="flex:0 0 36px;display:flex;align-items:center;justify-content:center;font-size:10px;color:{{ d.color }};font-weight:{{ d.weight }}">{{ d.label }}</div>
          </sc-for>
        </div>
      </div>

      <div style="position:relative">
        <div style="pointer-events:none;position:absolute;z-index:10;left:{{ todayLineLeft }}px;top:0;width:1.5px;height:{{ bodyHeight }}px;background:#2563eb;opacity:0.3"></div>

        <sc-for list="{{ rows }}" as="row" hint-placeholder-count="6">
          <div style="display:flex;height:54px;margin-bottom:2px;border-radius:7px;background:{{ row.tint }}">
            <div style="position:sticky;left:0;z-index:15;display:flex;flex-direction:column;justify-content:center;overflow:hidden;border-right:1px solid #e4e4e7;background:#fafafa;padding:0 12px;width:170px;min-width:170px;box-sizing:border-box">
              <div style="display:flex;align-items:center;gap:6px;overflow:hidden">
                <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;font-weight:500;color:#27272a">{{ row.title }}</span>
                <span style="border-radius:4px;padding:2px 6px;font-size:9px;font-weight:500;white-space:nowrap;background:{{ row.badgeBg }};color:{{ row.badgeFg }}">{{ row.badge }}</span>
              </div>
              <span style="margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;color:#a1a1aa">{{ row.assignee }}</span>
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;color:rgba(161,161,170,0.7)">{{ row.project }}</span>
            </div>
            <div style="position:relative;display:flex;align-items:center;flex:1;min-width:{{ totalWidth }}px">
              <div style="pointer-events:none;position:absolute;top:0;bottom:0;z-index:4;left:{{ todayX }}px;width:1.5px;background:#2563eb;opacity:0.3"></div>
              <div style="position:absolute;border-radius:3px;left:{{ row.ghostLeft }}px;width:{{ row.ghostWidth }}px;height:14px;background:#d4d4d8;opacity:{{ row.ghostOpacity }}"></div>
              <sc-if value="{{ row.showBar }}" hint-placeholder-val="{{ true }}">
                <div style="position:absolute;overflow:hidden;border-radius:3px;left:{{ row.barLeft }}px;width:{{ row.barWidth }}px;height:14px;background:{{ row.barColor }}"></div>
              </sc-if>
              <sc-if value="{{ row.showSpill }}">
                <div style="position:absolute;left:{{ row.spillLeft }}px;width:{{ row.spillWidth }}px;height:14px;background:#dc2626;border-radius:0 3px 3px 0"></div>
              </sc-if>
              <sc-if value="{{ row.label }}" hint-placeholder-val="{{ true }}">
                <span style="pointer-events:none;position:absolute;white-space:nowrap;font-size:10px;font-weight:500;left:{{ row.labelX }}px;top:20px;color:{{ row.labelColor }}">{{ row.label }}</span>
              </sc-if>
            </div>
          </div>
        </sc-for>
      </div>
    </div>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:16px;border-top:1px solid #e4e4e7;padding:10px 12px">
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#71717a"><span style="display:inline-block;height:8px;width:20px;border-radius:2px;background:#d4d4d8"></span>Scheduled</span>
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#71717a"><span style="display:inline-block;height:8px;width:20px;border-radius:2px;background:#2563eb"></span>Active</span>
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#71717a"><span style="display:inline-block;height:8px;width:20px;border-radius:2px;background:#16a34a"></span>Done</span>
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#71717a"><span style="display:inline-block;height:8px;width:20px;border-radius:2px;background:#dc2626"></span>Overdue</span>
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#71717a"><span style="display:inline-block;height:8px;width:20px;border-radius:2px;background:#d97706"></span>Blocked</span>
    <span style="display:flex;align-items:center;gap:6px;font-size:11px;color:#71717a"><span style="display:inline-block;height:8px;width:20px;border-radius:2px;background:#3b82f6"></span>In review</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;1100px&quot;,&quot;height&quot;:&quot;640px&quot;},&quot;tasks&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;Array&lt;{title:string,assignee:string,project:string,status:'todo'|'active'|'done'|'blocked'|'pending'|'overdue',start:number,duration:number}&gt;&quot;,&quot;default&quot;:[{&quot;title&quot;:&quot;Foundation excavation&quot;,&quot;assignee&quot;:&quot;Blessing Moyo&quot;,&quot;project&quot;:&quot;Kariba Heights&quot;,&quot;status&quot;:&quot;done&quot;,&quot;start&quot;:0,&quot;duration&quot;:8},{&quot;title&quot;:&quot;Slab pour Block A&quot;,&quot;assignee&quot;:&quot;Tariro Chirwa&quot;,&quot;project&quot;:&quot;Kariba Heights&quot;,&quot;status&quot;:&quot;active&quot;,&quot;start&quot;:8,&quot;duration&quot;:10}]}}">
class Component extends DCLogic {
  state = { search: '', filter: 'all', scale: 'day' };

  renderVals() {
    const DAY_W = 36, TASK_COL = 170, ROW_H = 54;
    const TODAY = 14; // index of today in the range
    const TOTAL_DAYS = 42;
    const startDate = new Date(2026, 5, 22); // Mon 22 Jun 2026

    const tasks = this.props.tasks ?? [];

    // Day headers
    const days = [];
    for (let i = 0; i < TOTAL_DAYS; i++) {
      const d = new Date(startDate.getTime() + i * 86400000);
      const isToday = i === TODAY;
      days.push({
        label: d.getDate() + ' ' + d.toLocaleString('en-US', { month: 'short' }),
        color: isToday ? '#52525b' : '#a1a1aa',
        weight: isToday ? '500' : '400',
      });
    }

    const totalWidth = TOTAL_DAYS * DAY_W;
    const todayX = TODAY * DAY_W + DAY_W / 2;

    const q = this.state.search.toLowerCase();
    const filtered = tasks.filter((t) => {
      if (q && !t.title.toLowerCase().includes(q) && !t.project.toLowerCase().includes(q)) return false;
      const f = this.state.filter;
      if (f === 'overdue' && t.status !== 'overdue') return false;
      if (f === 'blocked' && t.status !== 'blocked') return false;
      if (f === 'active' && t.status !== 'active') return false;
      if (f === 'done' && t.status !== 'done') return false;
      return true;
    });

    const rows = filtered.map((t) => {
      const left = t.start * DAY_W;
      const ghostWidth = Math.max(t.duration * DAY_W - 2, DAY_W - 2);
      const plannedEndX = left + ghostWidth;
      const s = t.status;
      const isDone = s === 'done', isBlocked = s === 'blocked', isOverdue = s === 'overdue',
        isPending = s === 'pending', isActive = s === 'active', isTodo = s === 'todo';
      const hasStarted = isActive || isDone || isBlocked || isPending;
      const barColor = isDone ? '#16a34a' : isBlocked ? '#d97706' : isOverdue ? '#93c5fd' : isPending ? '#3b82f6' : '#2563eb';
      const actualEndX = isDone ? plannedEndX : todayX;
      const actualWidth = hasStarted ? Math.max(actualEndX - left, 0) : 0;
      const spill = isOverdue ? Math.min(Math.max(todayX - plannedEndX, 0), 4 * DAY_W) : 0;
      const daysUntilDue = (t.start + t.duration - 1) - TODAY;
      let label = null;
      if (isDone) label = '\u2713 done';
      else if (isOverdue) label = Math.abs(daysUntilDue) + 'd over';
      else if (isBlocked) label = 'blocked';
      else if (isPending) label = 'in review';
      else if (daysUntilDue >= 0) label = daysUntilDue === 0 ? 'due today' : daysUntilDue + 'd left';
      const labelX = isOverdue ? plannedEndX + spill + 6 : Math.max(plannedEndX, left + actualWidth) + 6;
      const labelColor = isOverdue ? '#dc2626' : isDone ? '#16a34a' : isBlocked ? '#d97706' : '#a1a1aa';
      const badge = isDone ? { t: 'Done', bg: '#dcfce7', fg: '#15803d' }
        : isBlocked ? { t: 'Blocked', bg: '#fef3c7', fg: '#b45309' }
        : isOverdue ? { t: 'Overdue', bg: '#fee2e2', fg: '#b91c1c' }
        : isPending ? { t: 'Review', bg: '#dbeafe', fg: '#1d4ed8' }
        : isActive ? { t: 'Active', bg: '#dbeafe', fg: '#1d4ed8' }
        : { t: 'To do', bg: '#f4f4f5', fg: '#71717a' };
      const tint = isOverdue ? 'rgba(254,242,242,0.6)' : isBlocked ? 'rgba(255,251,235,0.6)' : 'rgba(250,250,250,0.5)';
      return {
        title: t.title, assignee: t.assignee, project: t.project,
        badge: badge.t, badgeBg: badge.bg, badgeFg: badge.fg, tint,
        ghostLeft: left, ghostWidth, ghostOpacity: isTodo ? 0.5 : isDone ? 0.4 : 0.8,
        showBar: (hasStarted || isOverdue) && (isOverdue ? ghostWidth : actualWidth) > 0,
        barLeft: left, barWidth: isOverdue ? ghostWidth : actualWidth, barColor: isOverdue ? '#93c5fd' : barColor,
        showSpill: isOverdue && spill > 0, spillLeft: plannedEndX, spillWidth: spill,
        label, labelX, labelColor,
      };
    });

    const overdue = filtered.filter((t) => t.status === 'overdue').length;
    const blocked = filtered.filter((t) => t.status === 'blocked').length;
    let summaryText = 'Showing ' + filtered.length + ' of ' + tasks.length + ' tasks';
    if (overdue > 0) summaryText += ' \u00b7 ' + overdue + ' overdue';
    if (blocked > 0) summaryText += ' \u00b7 ' + blocked + ' blocked';

    const pillStyle = (sel) => sel
      ? { bg: '#18181b', fg: '#ffffff', border: '1px solid #18181b' }
      : { bg: 'transparent', fg: '#71717a', border: '1px solid #e4e4e7' };

    const pills = [
      { key: 'all', label: 'All' }, { key: 'overdue', label: 'Overdue' }, { key: 'blocked', label: 'Blocked' },
      { key: 'active', label: 'Active' }, { key: 'done', label: 'Done' },
    ].map((p) => ({ ...p, ...pillStyle(this.state.filter === p.key), onClick: () => this.setState({ filter: p.key }) }));

    const scales = ['day', 'week', 'month'].map((s) => ({
      label: s, ...pillStyle(this.state.scale === s), onClick: () => this.setState({ scale: s }),
    }));

    return {
      search: this.state.search,
      onSearch: (e) => this.setState({ search: e.target.value }),
      pills, scales, days, rows, summaryText,
      totalWidth, todayX, todayLineLeft: TASK_COL + todayX,
      minWidth: TASK_COL + totalWidth,
      bodyHeight: rows.length * (ROW_H + 2),
    };
  }
}
</script>
</body>
</html>
