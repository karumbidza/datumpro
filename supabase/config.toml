# Minimal local-dev config for the Supabase CLI. Run `supabase start` to boot a
# local Postgres + Auth stack, then `pnpm db:reset` to apply migrations.
project_id = "datumpro"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
# Email OTP / magic link is the default sign-in for v1. SMS OTP (Africa's Talking)
# is wired at the app layer.
[auth.email]
enable_signup = true

# chat-push is invoked by a Database Webhook, not an end-user JWT. It authorizes
# itself with the CHAT_PUSH_SECRET shared-secret header, so skip JWT verification.
[functions.chat-push]
verify_jwt = false
